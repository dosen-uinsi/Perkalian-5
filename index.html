<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelipatan Lima & Tebak Kelinci</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* CSS Variables untuk Dynamic Theming */
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --text-color: #f8fafc;
      --primary-color: #38bdf8;
      --secondary-color: #94a3b8;
      --font-family: 'Nunito', sans-serif;
      --base-size: 16px;
    }

    * { font-family: var(--font-family); }

    /* Keyframes Animasi */
    @keyframes popIn {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110%) rotate(720deg); opacity: 0; }
    }

    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    @keyframes buttonGlow {
      0%, 100% { box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.4), 0 0 30px rgba(56, 189, 248, 0.3); }
      50% { box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.6), 0 0 40px rgba(56, 189, 248, 0.5); }
    }

    /* Getaran Visual (Visual Shake) */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px) rotate(-2deg); }
      40% { transform: translateX(6px) rotate(2deg); }
      60% { transform: translateX(-4px) rotate(-1deg); }
      80% { transform: translateX(4px) rotate(1deg); }
    }
    .shake-anim { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

    /* Animasi Balik Kartu (Flip Card) */
    .card-container { perspective: 1000px; }
    .card-inner { 
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); 
      transform-style: preserve-3d; 
      position: relative; 
      width: 100%; 
      height: 100%; 
    }
    .card-front, .card-back { 
      backface-visibility: hidden; 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      border-radius: 1rem;
    }
    .card-back { transform: rotateY(180deg); }
    .card.flipped .card-inner { transform: rotateY(180deg); }

    /* Utility Classes */
    .number-pop { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .confetti-piece { animation: confettiFall 2.5s ease-in forwards; }
    .pulse-ring { animation: pulseRing 0.8s ease-out forwards; }
    .glow-button { animation: buttonGlow 2s ease-in-out infinite; }
    .btn-press { transition: transform 0.15s ease; cursor: pointer; }
    .btn-press:active { transform: scale(0.92); }
    .progress-fill { transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Efek Wortel (Nyawa) */
    .life-icon { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }
    .life-lost { transform: scale(0.7); opacity: 0.3; filter: grayscale(100%); }

    /* Theming Classes */
    .theme-bg { background-color: var(--bg-color); }
    .theme-surface { background-color: var(--surface-color); }
    .theme-text { color: var(--text-color); }
    .theme-primary-bg { background-color: var(--primary-color); }
    .theme-primary-text { color: var(--primary-color); }
    .theme-secondary-text { color: var(--secondary-color); }
  </style>
</head>

<body class="h-full">
  <div id="app-wrapper" class="theme-bg h-full w-full overflow-auto flex flex-col items-center justify-center p-6 relative">
    
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50"></div>

    <div id="screen-main" class="w-full max-w-md relative transition-opacity duration-500">
      
      <h1 id="main-title" class="theme-text text-center font-black mb-8 tracking-tight" style="font-size: calc(var(--base-size) * 2);">Kelipatan 5</h1>

      <div class="theme-surface rounded-3xl p-8 mb-6 text-center relative overflow-hidden">
        <div id="number-display" class="theme-primary-text font-black tabular-nums leading-none mb-3" style="font-size: calc(var(--base-size) * 4.5);">0</div>
        <p id="press-info" class="theme-secondary-text font-semibold" style="font-size: calc(var(--base-size) * 0.85);">Tekan tombol untuk mulai!</p>
      </div>

      <div id="numbers-grid" class="grid grid-cols-5 gap-2 mb-6 min-h-[88px]"></div>

      <div class="theme-surface rounded-full h-3 mb-2 overflow-hidden">
        <div id="progress-bar" class="theme-primary-bg progress-fill h-full rounded-full" style="width: 0%;"></div>
      </div>
      <p id="progress-text" class="theme-secondary-text text-center font-semibold mb-6" style="font-size: calc(var(--base-size) * 0.75);">0 / 10 tekanan</p>

      <div class="flex justify-center relative mb-6">
        <div id="pulse-container" class="absolute inset-0 flex items-center justify-center pointer-events-none"></div>
        <button id="main-btn" onclick="handlePress()" class="theme-primary-bg theme-bg btn-press font-extrabold px-10 py-4 rounded-2xl shadow-lg shadow-sky-500/25 hover:shadow-xl hover:shadow-sky-500/30 transition-shadow border-0 outline-none focus:ring-4 focus:ring-sky-400/30" style="font-size: calc(var(--base-size) * 1.1);"> 
          <span class="flex items-center gap-2"> 
            <i data-lucide="hand-metal" style="width:22px; height:22px;"></i> 
            <span id="btn-text">Tekan Saya!</span> 
          </span> 
        </button>
      </div>

      <div id="reset-area" class="hidden text-center mt-8">
        <button onclick="startCardGame()" class="theme-primary-bg theme-bg btn-press glow-button font-black px-12 py-4 rounded-2xl border-0 outline-none transition-all focus:ring-4" style="font-size: calc(var(--base-size) * 1.1);"> 
          <span class="flex items-center gap-2 justify-center"> 
            <i data-lucide="play" style="width:24px; height:24px;"></i> Mulai Permainan 
          </span> 
        </button>
      </div>
    </div>

    <div id="screen-game" class="hidden w-full max-w-md relative transition-opacity duration-500 flex flex-col items-center">
      
      <h2 class="theme-text text-center font-black mb-2 tracking-tight" style="font-size: calc(var(--base-size) * 2);">Tebak Kelinci!</h2>
      
      <div id="lives-container" class="flex gap-2 mb-2 text-4xl">
        <span id="life-1" class="life-icon drop-shadow-md">🥕</span>
        <span id="life-2" class="life-icon drop-shadow-md">🥕</span>
      </div>

      <p id="game-instruction" class="theme-secondary-text text-center font-semibold mb-8" style="font-size: calc(var(--base-size) * 1);">Pilih kartu untuk menemukan 🐰</p>

      <div class="grid grid-cols-2 gap-4 w-full mb-10">
        
        <div class="card-container h-32 w-full cursor-pointer btn-press" onclick="handleCardClick(0)" id="card-container-0">
          <div class="card w-full h-full" id="card-0">
            <div class="card-inner">
              <div class="card-front theme-surface flex items-center justify-center border-4 border-transparent hover:border-sky-400/50 transition-colors">
                <span class="text-4xl">❓</span>
              </div>
              <div class="card-back theme-surface flex items-center justify-center border-4 border-sky-400">
                <span class="text-5xl" id="card-content-0">❌</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card-container h-32 w-full cursor-pointer btn-press" onclick="handleCardClick(1)" id="card-container-1">
          <div class="card w-full h-full" id="card-1">
            <div class="card-inner">
              <div class="card-front theme-surface flex items-center justify-center border-4 border-transparent hover:border-sky-400/50 transition-colors">
                <span class="text-4xl">❓</span>
              </div>
              <div class="card-back theme-surface flex items-center justify-center border-4 border-sky-400">
                <span class="text-5xl" id="card-content-1">❌</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card-container h-32 w-full cursor-pointer btn-press" onclick="handleCardClick(2)" id="card-container-2">
          <div class="card w-full h-full" id="card-2">
            <div class="card-inner">
              <div class="card-front theme-surface flex items-center justify-center border-4 border-transparent hover:border-sky-400/50 transition-colors">
                <span class="text-4xl">❓</span>
              </div>
              <div class="card-back theme-surface flex items-center justify-center border-4 border-sky-400">
                <span class="text-5xl" id="card-content-2">❌</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card-container h-32 w-full cursor-pointer btn-press" onclick="handleCardClick(3)" id="card-container-3">
          <div class="card w-full h-full" id="card-3">
            <div class="card-inner">
              <div class="card-front theme-surface flex items-center justify-center border-4 border-transparent hover:border-sky-400/50 transition-colors">
                <span class="text-4xl">❓</span>
              </div>
              <div class="card-back theme-surface flex items-center justify-center border-4 border-sky-400">
                <span class="text-5xl" id="card-content-3">❌</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div id="game-result-msg" class="theme-primary-text font-bold text-xl mb-8 h-8 text-center w-full"></div>

      <div id="game-actions" class="hidden flex gap-4 w-full">
        <button onclick="backToMain()" class="theme-primary-bg theme-bg btn-press w-full font-bold py-3 rounded-xl shadow-lg border-0 outline-none"> 
          Kembali Awal
        </button>
      </div>

    </div>

  </div>

  <script>
    // --- AUDIO SETUP ---
    const soundClick = new Audio('https://github.com/dosen-uinsi/Perkalian-5/raw/main/89533__cgeffex__slower-lower-bubble-pop1.mp3');
    const soundNextStage = new Audio('https://github.com/dosen-uinsi/Perkalian-5/raw/main/320654__rhodesmas__level-up-02.wav');
    const soundWrong = new Audio('https://github.com/dosen-uinsi/Perkalian-5/raw/main/834512__yoshikamiyafuji__fail-sound-wa-wa-wah.wav');
    const soundCorrect = new Audio('https://github.com/dosen-uinsi/Perkalian-5/raw/main/842513__pieshelpfuloven__triple_ping_notification_sound_mobile_optimized.wav');

    // --- HAPTIC FEEDBACK (GETARAN PERANGKAT) ---
    function triggerVibration(pattern) {
      // Cek apakah browser/perangkat mendukung API getaran
      if (navigator.vibrate) {
        navigator.vibrate(pattern);
      }
    }

    // --- STATE MAIN GAME ---
    let pressCount = 0;
    const maxPresses = 10;

    // --- STATE CARD GAME ---
    let rabbitIndex = -1;
    let cardGameActive = false;
    let guessCount = 0;

    // --- CACHE DOM ELEMENTS ---
    const domNodes = {
      screenMain: document.getElementById('screen-main'),
      numDisplay: document.getElementById('number-display'),
      pressInfo: document.getElementById('press-info'),
      grid: document.getElementById('numbers-grid'),
      progressBar: document.getElementById('progress-bar'),
      progressText: document.getElementById('progress-text'),
      pulseContainer: document.getElementById('pulse-container'),
      mainBtn: document.getElementById('main-btn'),
      resetArea: document.getElementById('reset-area'),
      screenGame: document.getElementById('screen-game'),
      instructionMsg: document.getElementById('game-instruction'),
      resultMsg: document.getElementById('game-result-msg'),
      gameActions: document.getElementById('game-actions'),
      livesContainer: document.getElementById('lives-container'),
      life1: document.getElementById('life-1'),
      life2: document.getElementById('life-2'),
      confetti: document.getElementById('confetti-container')
    };

    const defaultConfig = {
      main_title: 'Kelipatan 5',
      button_text: 'Tekan Saya!',
      background_color: '#0f172a',
      surface_color: '#1e293b',
      text_color: '#f8fafc',
      primary_action_color: '#38bdf8',
      secondary_color: '#94a3b8',
      font_family: 'Nunito',
      font_size: 16
    };

    // --- SETUP TEMA ---
    function applyConfig(config) {
      const root = document.documentElement;
      root.style.setProperty('--bg-color', config.background_color || defaultConfig.background_color);
      root.style.setProperty('--surface-color', config.surface_color || defaultConfig.surface_color);
      root.style.setProperty('--text-color', config.text_color || defaultConfig.text_color);
      root.style.setProperty('--primary-color', config.primary_action_color || defaultConfig.primary_action_color);
      root.style.setProperty('--secondary-color', config.secondary_color || defaultConfig.secondary_color);
      root.style.setProperty('--font-family', `"${config.font_family || defaultConfig.font_family}", sans-serif`);
      root.style.setProperty('--base-size', `${config.font_size || defaultConfig.font_size}px`);

      document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
      document.getElementById('btn-text').textContent = config.button_text || defaultConfig.button_text;
    }

    if(window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); }
      });
    }

    // ==========================================
    // LOGIKA LAYAR 1 (KELIPATAN 5)
    // ==========================================
    function handlePress() {
      if (pressCount >= maxPresses) return;

      // Audio & Getar ringan untuk setiap klik
      soundClick.currentTime = 0;
      soundClick.play();
      triggerVibration(15); // Getar super singkat 15ms

      pressCount++;
      const value = pressCount * 5;

      // Update angka
      domNodes.numDisplay.textContent = value;
      domNodes.numDisplay.classList.remove('number-pop');
      void domNodes.numDisplay.offsetWidth;
      domNodes.numDisplay.classList.add('number-pop');

      // Update info teks
      domNodes.pressInfo.textContent = pressCount < maxPresses 
        ? `Tekanan ke-${pressCount} · Sisa ${maxPresses - pressCount} lagi` 
        : 'Selesai! Buka game rahasia di bawah 👇';

      // Buat chip angka
      const chipContainer = document.createElement('div');
      chipContainer.className = 'flex flex-col items-center gap-1 number-pop';
      chipContainer.innerHTML = `
        <div class="theme-primary-bg theme-bg rounded-xl flex items-center justify-center font-extrabold text-sm py-2 w-12">${value}</div>
        <div class="theme-secondary-text text-xs font-semibold">5×${pressCount}</div>
      `;
      domNodes.grid.appendChild(chipContainer);

      // Efek Pulse
      const ring = document.createElement('div');
      ring.className = 'pulse-ring absolute rounded-2xl w-full h-full';
      ring.style.border = '3px solid var(--primary-color)';
      domNodes.pulseContainer.appendChild(ring);
      setTimeout(() => ring.remove(), 800);

      // Progress bar
      domNodes.progressBar.style.width = `${(pressCount / maxPresses) * 100}%`;
      domNodes.progressText.textContent = `${pressCount} / ${maxPresses} tekanan`;

      // Cek Selesai
      if (pressCount >= maxPresses) {
        domNodes.mainBtn.style.opacity = '0.4';
        domNodes.mainBtn.style.cursor = 'not-allowed';

        setTimeout(() => {
          domNodes.resetArea.classList.remove('hidden');
          domNodes.resetArea.classList.add('number-pop');
          launchConfetti();
        }, 500);
      }
    }

    function resetLayarSatu() {
      pressCount = 0;
      domNodes.numDisplay.textContent = '0';
      domNodes.pressInfo.textContent = 'Tekan tombol untuk mulai!';
      domNodes.grid.innerHTML = '';
      domNodes.progressBar.style.width = '0%';
      domNodes.progressText.textContent = '0 / 10 tekanan';
      domNodes.resetArea.classList.add('hidden');
      domNodes.mainBtn.style.opacity = '1';
      domNodes.mainBtn.style.cursor = 'pointer';
    }

    // ==========================================
    // LOGIKA LAYAR 2 (GAME TEBAK KARTU)
    // ==========================================
    function startCardGame() {
      // Audio & Getar naik level saat ganti layar
      soundNextStage.currentTime = 0;
      soundNextStage.play();
      triggerVibration([30, 50, 40]); // Irama naik

      domNodes.screenMain.classList.add('hidden');
      domNodes.screenGame.classList.remove('hidden');
      initCards();
    }

    function initCards() {
      cardGameActive = true;
      guessCount = 0; 
      rabbitIndex = Math.floor(Math.random() * 4);

      // Reset Nyawa Wortel
      domNodes.life1.classList.remove('life-lost');
      domNodes.life2.classList.remove('life-lost');
      domNodes.livesContainer.classList.remove('shake-anim');

      domNodes.instructionMsg.textContent = "Pilih kartu untuk menemukan 🐰";
      domNodes.resultMsg.textContent = "";
      domNodes.gameActions.classList.add('hidden');

      // Reset tampilan 4 kartu
      for (let i = 0; i < 4; i++) {
        const cardContainer = document.getElementById(`card-container-${i}`);
        const cardEl = document.getElementById(`card-${i}`);
        const contentEl = document.getElementById(`card-content-${i}`);
        
        cardEl.classList.remove('flipped');
        cardContainer.classList.remove('shake-anim'); // Hapus sisa getaran sebelumnya
        
        setTimeout(() => {
          contentEl.textContent = (i === rabbitIndex) ? '🐰' : '❌';
        }, 300);
      }
    }

    function handleCardClick(selectedIndex) {
      if (!cardGameActive) return; 
      
      const cardToFlip = document.getElementById(`card-${selectedIndex}`);
      const cardContainer = document.getElementById(`card-container-${selectedIndex}`);
      
      if (cardToFlip.classList.contains('flipped')) return;

      cardToFlip.classList.add('flipped');
      guessCount++;

      if (selectedIndex === rabbitIndex) {
        // --- MENANG ---
        soundCorrect.currentTime = 0;
        soundCorrect.play();
        triggerVibration([40, 50, 40, 50, 80]); // Irama getar bahagia

        cardGameActive = false;
        domNodes.resultMsg.style.color = 'var(--primary-color)';
        domNodes.resultMsg.textContent = "Hore! Ketemu kelincinya! 🎉";
        domNodes.instructionMsg.textContent = `Hebat! Kamu menebak dalam ${guessCount} percobaan.`;
        setTimeout(() => launchConfetti(), 300);
        tampilkanTombolAkhir();

      } else {
        // --- SALAH TEBAK ---
        soundWrong.currentTime = 0;
        soundWrong.play();
        triggerVibration([200, 100, 200]); // Irama getar salah (panjang ganda)

        // Efek Visual Getar (CSS Shake)
        cardContainer.classList.remove('shake-anim');
        domNodes.livesContainer.classList.remove('shake-anim');
        void cardContainer.offsetWidth; // Trigger reflow agar animasi bisa diulang
        cardContainer.classList.add('shake-anim'); // Kartu bergetar
        domNodes.livesContainer.classList.add('shake-anim'); // Wortel bergetar

        // Kurangi nyawa wortel secara visual
        if (guessCount === 1) {
          domNodes.life2.classList.add('life-lost'); // Hilangkan wortel kanan
        } else if (guessCount === 2) {
          domNodes.life1.classList.add('life-lost'); // Hilangkan wortel kiri
        }

        if (guessCount < 2) {
          // Masih ada kesempatan
          domNodes.resultMsg.style.color = '#ef4444'; 
          domNodes.resultMsg.textContent = "Yah, salah! Coba 1 kartu lagi!";
          domNodes.instructionMsg.textContent = "Sisa 1 kesempatan (1 wortel).";
        } else {
          // --- KALAH ---
          cardGameActive = false;
          domNodes.resultMsg.style.color = '#ef4444'; 
          domNodes.resultMsg.textContent = "Nyawa habis! 😢";
          domNodes.instructionMsg.textContent = "Kelincinya ternyata ada di sini:";
          
          // Buka kartu kelinci sebagai petunjuk
          setTimeout(() => {
            document.getElementById(`card-${rabbitIndex}`).classList.add('flipped');
            domNodes.resultMsg.style.color = 'var(--primary-color)'; 
          }, 1000);
          
          tampilkanTombolAkhir();
        }
      }
    }

    function tampilkanTombolAkhir() {
      setTimeout(() => {
        domNodes.gameActions.classList.remove('hidden');
        domNodes.gameActions.classList.add('number-pop');
      }, 1000);
    }

    function backToMain() {
      resetLayarSatu();
      domNodes.screenGame.classList.add('hidden');
      domNodes.screenMain.classList.remove('hidden');
    }

    // ==========================================
    // EFEK VISUAL
    // ==========================================
    function launchConfetti() {
      const colors = ['var(--primary-color)', 'var(--text-color)', '#fbbf24', '#a78bfa', '#34d399', '#fb7185'];
      const fragment = document.createDocumentFragment();

      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece absolute z-50';
        const size = 8 + Math.random() * 10;
        
        Object.assign(piece.style, {
          left: `${Math.random() * 100}%`,
          top: '-10%',
          width: `${size}px`,
          height: `${size}px`,
          backgroundColor: colors[Math.floor(Math.random() * colors.length)],
          borderRadius: Math.random() > 0.5 ? '50%' : '4px',
          animationDelay: `${Math.random()}s`,
          animationDuration: `${2 + Math.random() * 2}s`
        });
        
        fragment.appendChild(piece);
      }
      
      domNodes.confetti.appendChild(fragment);
      setTimeout(() => { domNodes.confetti.innerHTML = ''; }, 4500);
    }

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
